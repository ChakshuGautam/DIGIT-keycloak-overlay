name: Build and Push
run-name: Build token-exchange-svc ${{ github.ref_name }}

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'Dockerfile'
      - 'tsconfig.json'

env:
  IMAGE_NAME: token-exchange-svc
  DOCKER_USERNAME: ${{ vars.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_ACCESS_TOKEN }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: [16379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      keycloak:
        image: quay.io/keycloak/keycloak:24.0
        env:
          KC_HOSTNAME_STRICT: "false"
          KC_HTTP_ENABLED: "true"
          KEYCLOAK_ADMIN: admin
          KEYCLOAK_ADMIN_PASSWORD: admin
        ports:
          - 8180:8080
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/localhost/8080 && echo -e \"GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n\" >&3 && timeout 5 cat <&3 | grep -q UP'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 30s
    env:
      LIVE_KC_URL: http://localhost:8180
      KEYCLOAK_ADMIN_USERNAME: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      DIGIT_TENANTS: "pg:pg.citya,pg.cityb;mz:mz.chimoio"
      REDIS_HOST: localhost
      REDIS_PORT: 16379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Unit + E2E tests
        run: npm test
      - name: Setup KC realms
        run: npx tsx scripts/ci-setup-kc.ts
      - name: Integration tests
        run: npm run test:integration

  resolve-tag:
    name: Resolve tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Generate tag
        id: tag
        run: |
          BRANCH="${GITHUB_REF##*/}"
          COMMIT_HASH=$(echo "$GITHUB_SHA" | head -c 7)
          echo "tag=${BRANCH}-${COMMIT_HASH}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.arch }}
    needs: [test, resolve-tag]
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-${{ matrix.arch }}-buildx-${{ env.IMAGE_NAME }}-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-buildx-${{ env.IMAGE_NAME }}-

      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --file Dockerfile \
            --tag egovio/${{ env.IMAGE_NAME }}:${{ needs.resolve-tag.outputs.tag }}-${{ matrix.arch }} \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache,mode=max \
            --push \
            .

  manifest:
    name: Create manifest
    needs: [resolve-tag, build]
    runs-on: ubuntu-latest
    steps:
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Create and push multi-arch manifest
        run: |
          TAG="${{ needs.resolve-tag.outputs.tag }}"
          docker manifest create egovio/${{ env.IMAGE_NAME }}:${TAG} \
            egovio/${{ env.IMAGE_NAME }}:${TAG}-amd64 \
            egovio/${{ env.IMAGE_NAME }}:${TAG}-arm64
          docker manifest push egovio/${{ env.IMAGE_NAME }}:${TAG}

      - name: Summary
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`egovio/${{ env.IMAGE_NAME }}:${{ needs.resolve-tag.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms**: linux/amd64, linux/arm64" >> $GITHUB_STEP_SUMMARY
